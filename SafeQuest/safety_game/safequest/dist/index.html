<!doctype html>
<html lang="en">

<head>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // SafeQuest BrowserRouter has basename="/SafeQuest/safety_game/safequest/dist"
    // When accessed via /index.html, React Router sees "/index.html" relative to basename → no route match → blank.
    // Fix: strip trailing /index.html so the URL sits exactly at the basename root.
    (function() {
      if (window.location.pathname.endsWith('/index.html')) {
        var clean = window.location.pathname.slice(0, -'/index.html'.length) || '/';
        window.history.replaceState(null, '', clean + window.location.search + window.location.hash);
      }
    })();
  </script>
  <script type="module" crossorigin src="./assets/index-DKAhZsEj.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DFG3H4Pc.css">
</head>

</body>

</html>
