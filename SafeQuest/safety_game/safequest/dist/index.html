  <script>
    // Fix: SafeQuest uses BrowserRouter with routes at "/" etc.
    // When served from a subdirectory, reset URL to "/" so React Router matches correctly.
    (function() {
      var base = '/SafeQuest/safety_game/safequest/dist';
      if (window.location.pathname.startsWith(base)) {
        var rest = window.location.pathname.slice(base.length) || '/';
        window.history.replaceState(null, '', rest || '/');
      }
    })();
  </script>
